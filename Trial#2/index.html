<!DOCTYPE html>
<html lang="en">

<head>
    <!-- the head tag is the metadata section; everything that happens here doesnt show up on the webpage; its the behind the scenes -->
    <meta charset="UTF-8">
    <!-- ensures correct use of characters, signs and symbols from any language; UTF-8 is a universal translator  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- scales the "viewport" according to the users screen -->
    <title>LMAB??</title> <!-- this defines the title of the page, what appears on the browser tab -->
    <link rel="stylesheet" href="style.css"> <!-- links the style.css file so the browser has colours -->
</head>

<body> <!-- the body tag is what the user actually sees and interacts with on the page  -->

    <h1>BOMBOCLAT!</h1>
    <p>Your HTML is rendering correctly.</p>

    <script src="app.js"></script>
</body>

</html>
